<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sixty4 | Tactical Map</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050a0f; }
        canvas { display: block; cursor: grab; }
        canvas:active { cursor: grabbing; }
    </style>
</head>
<body>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            backgroundColor: '#050a0f',
            physics: { default: 'arcade' },
            scene: { preload, create, update }
        };

        const game = new Phaser.Game(config);

        function preload() {
            this.load.image('base', 'https://cdn.phaser.io/sandbox/square-earth.png');
        }

        function create() {
            // 1. World & Camera Setup
            const worldSize = 3000; // Even bigger for more "Separation"
            this.cameras.main.setBounds(0, 0, worldSize, worldSize);
            
            // 2. Draw Visual Grid
            let graphics = this.add.graphics();
            graphics.lineStyle(1, 0x1a2a3a, 1);
            for (let i = 0; i <= worldSize; i += 100) {
                graphics.lineBetween(i, 0, i, worldSize);
                graphics.lineBetween(0, i, 2000, i);
            }

            // 3. HARD-WIRED KEYBOARD (WASD + Arrows)
            // This ensures the game captures the keys immediately
            this.keys = this.input.keyboard.addKeys({
                up: Phaser.Input.Keyboard.KeyCodes.W,
                down: Phaser.Input.Keyboard.KeyCodes.S,
                left: Phaser.Input.Keyboard.KeyCodes.A,
                right: Phaser.Input.Keyboard.KeyCodes.D,
                upArrow: Phaser.Input.Keyboard.KeyCodes.UP,
                downArrow: Phaser.Input.Keyboard.KeyCodes.DOWN,
                leftArrow: Phaser.Input.Keyboard.KeyCodes.LEFT,
                rightArrow: Phaser.Input.Keyboard.KeyCodes.RIGHT
            });

            // 4. ROBUST DRAGGING (Using 'pointerdown' offset)
            this.input.on('pointerdown', (pointer) => {
                this.dragStartX = this.cameras.main.scrollX + pointer.x;
                this.dragStartY = this.cameras.main.scrollY + pointer.y;
            });

            this.input.on('pointermove', (pointer) => {
                if (pointer.isDown) {
                    this.cameras.main.scrollX = this.dragStartX - pointer.x;
                    this.cameras.main.scrollY = this.dragStartY - pointer.y;
                }
            });

            // 5. Create Bases
            createBase(this, 400, 400, "Checkmate HQ", 0x00ff00);
            createBase(this, 1500, 1200, "Rival-X", 0xff0000); // Moved further away

            // 6. HUD (Always visible)
            this.add.text(20, 20, "🛰️ SYSTEM ONLINE | WASD TO SCAN", {
                font: '16px Courier', fill: '#00ff00'
            }).setScrollFactor(0);
        }

        function update() {
            const cam = this.cameras.main;
            const speed = 15;

            // Move Left
            if (this.keys.left.isDown || this.keys.leftArrow.isDown) cam.scrollX -= speed;
            // Move Right
            if (this.keys.right.isDown || this.keys.rightArrow.isDown) cam.scrollX += speed;
            // Move Up (Fixes your broken key!)
            if (this.keys.up.isDown || this.keys.upArrow.isDown) cam.scrollY -= speed;
            // Move Down
            if (this.keys.down.isDown || this.keys.downArrow.isDown) cam.scrollY += speed;
        }

        function createBase(scene, x, y, name, color) {
            let container = scene.add.container(x, y);
            let rect = scene.add.rectangle(0, 0, 80, 80, color, 0.2).setStrokeStyle(2, color);
            let text = scene.add.text(0, 55, name, { font: '14px Courier', fill: '#fff' }).setOrigin(0.5);
            container.add([rect, text]);
            
            rect.setInteractive();
            rect.on('pointerdown', (pointer, localX, localY, event) => {
                event.stopPropagation(); // Prevents map from moving when clicking base
                alert(`CONNECTED TO ${name}\nStatus: Tactical View Active`);
            });
        }
    </script>
</body>
</html>
