<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Sixty4 | World Map</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #050a0f;
            font-family: 'Courier New', monospace;
        }
        #ui-overlay {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: #00ff00;
            padding: 15px;
            border: 2px solid #00ff00;
            font-size: 12px;
            z-index: 1000;
            max-width: 300px;
            border-radius: 5px;
        }
        #player-info {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #00ff00;
            padding: 15px;
            border: 2px solid #00ff00;
            font-size: 12px;
            z-index: 1000;
            border-radius: 5px;
        }
        #sector-info {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.9);
            color: #00ff00;
            padding: 15px;
            border: 2px solid #00ff00;
            font-size: 11px;
            z-index: 1000;
            max-width: 350px;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
        }
        .loading { color: #ffaa00; }
        .error { color: #ff4444; }
        .success { color: #00ff00; }
        @keyframes pulse {
            0% { box-shadow: 0 0 10px #00ff00; }
            50% { box-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00; }
            100% { box-shadow: 0 0 10px #00ff00; }
        }
        .pulse-animation {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <div><strong>🗺️ SECTOR MAP</strong></div>
        <div id="zoom-level">Zoom: 5%</div>
        <div id="coordinates">Pos: (4000, 4000)</div>
        <div id="connection-status" class="loading">⚡ Connecting...</div>
    </div>
    
    <div id="player-info">
        <div id="player-name">Loading...</div>
        <div id="player-sector">Sector: --</div>
        <div id="player-base">Base: --</div>
        <div id="player-resources">Resources: --</div>
        <hr style="border: 1px solid #00ff00; margin: 8px 0;">
        <div id="player-location-btn" style="cursor: pointer; padding: 8px; background: #1a3a2a; border: 1px solid #00ff00; border-radius: 3px; text-align: center; margin-top: 8px;">
            📍 YOUR LOCATION
        </div>
        <div id="location-details" style="font-size: 10px; margin-top: 8px; display: none; color: #ffaa00;">
            Location info will appear here
        </div>
    </div>
    
    <div id="sector-info">
        <div><strong>📍 Sector Information</strong></div>
        <div id="sector-details">Click on a sector to view details</div>
    </div>

    <script>
        // ════════════════════════════════════════════════════════════════════
        // GAME MAP SYSTEM - Synced with Telegram Bot Backend
        // ════════════════════════════════════════════════════════════════════
        
        const config = {
            type: Phaser.AUTO,
            scale: { mode: Phaser.Scale.RESIZE, width: '100%', height: '100%' },
            backgroundColor: '#050a0f',
            input: { activePointers: 3 },
            scene: { preload, create, update }
        };

        const game = new Phaser.Game(config);
        
        // ──── GLOBAL STATE ────
        let gameState = {
            userId: null,
            currentSector: null,
            playerData: null,
            allSectors: {},
            baseLocations: {},  // user_id -> {sector, x, y, name, level}
            selectedSector: null
        };
        
        let lastUpdate = 0;
        const UPDATE_INTERVAL = 5000;  // Sync every 5 seconds

        // ──── INITIALIZE USER ────
        function initializeUser() {
            const params = new URLSearchParams(window.location.search);
            gameState.userId = params.get('user_id') || localStorage.getItem('user_id');
            
            if (gameState.userId) {
                console.log('✅ User initialized:', gameState.userId);
                localStorage.setItem('user_id', gameState.userId);
                updateConnectionStatus('success', '✅ Connected');
                setupLocationButton();
                return true;
            } else {
                console.warn('⚠️ No user_id provided');
                updateConnectionStatus('error', '❌ No User ID');
                return false;
            }
        }

        // ──── LOCATION BUTTON ────
        function setupLocationButton() {
            const btn = document.getElementById('player-location-btn');
            btn.addEventListener('click', () => {
                const details = document.getElementById('location-details');
                if (details.style.display === 'none') {
                    showLocationDetails();
                    details.style.display = 'block';
                    btn.style.background = '#2a5a3a';
                } else {
                    details.style.display = 'none';
                    btn.style.background = '#1a3a2a';
                }
            });
        }

        function showLocationDetails() {
            const details = document.getElementById('location-details');
            if (!gameState.playerData) {
                details.innerHTML = '⚠️ Location data loading...';
                return;
            }

            const pd = gameState.playerData;
            const sector = pd.sector || '?';
            const sectorData = gameState.allSectors[sector];
            
            let html = `<strong>📍 YOU ARE HERE</strong><br>`;
            html += `Sector: <strong>${sector}</strong><br>`;
            if (sectorData) {
                html += `Grid: (${sectorData.gridX}x${sectorData.gridY})<br>`;
            }
            html += `Base: <strong>${pd.base_name || 'Unnamed'}</strong><br>`;
            html += `Level: <strong>${pd.level}</strong><br>`;
            
            // Add teleport info if available
            if (pd.teleport_available) {
                html += `<br><strong>⚡ Teleport Available</strong><br>`;
                html += `Ready to move to another sector`;
            }
            
            details.innerHTML = html;
        }

        // ──── API CALLS ────
        async function fetchPlayerData() {
            if (!gameState.userId) return null;
            
            try {
                // Fetch from your backend API
                const response = await fetch(`/api/player/${gameState.userId}`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    gameState.playerData = data;
                    gameState.currentSector = data.sector;
                    return data;
                }
            } catch (e) {
                console.debug('API call to /api/player failed (expected in local dev)');
                // Return mock data for development
                return getMockPlayerData();
            }
        }

        async function fetchAllBases() {
            try {
                const response = await fetch('/api/all_bases', {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    return data.bases || [];
                }
            } catch (e) {
                console.debug('Failed to fetch bases');
                return getMockBases();
            }
        }

        // ──── MOCK DATA (for development) ────
        function getMockPlayerData() {
            return {
                user_id: gameState.userId,
                username: `Player_${gameState.userId.slice(-4)}`,
                sector: Math.floor(Math.random() * 9) + 1,
                level: Math.floor(Math.random() * 25) + 1,
                base_name: 'Fortress Alpha',
                base_resources: {
                    resources: {
                        wood: Math.floor(Math.random() * 500),
                        bronze: Math.floor(Math.random() * 300),
                        iron: Math.floor(Math.random() * 100)
                    },
                    food: Math.floor(Math.random() * 200)
                },
                wins: Math.floor(Math.random() * 50),
                war_points: Math.floor(Math.random() * 5000)
            };
        }

        function getMockBases() {
            const bases = [];
            const baseNames = ['Obsidian Keep', 'Crystal Spire', 'Iron Fortress', 'Shadow Hold', 'Golden Peak'];
            
            for (let i = 0; i < 15; i++) {
                const sector = Math.floor(Math.random() * 9) + 1;
                bases.push({
                    user_id: `player_${i}`,
                    username: `Player${i}`,
                    sector: sector,
                    base_name: baseNames[i % baseNames.length],
                    level: Math.floor(Math.random() * 30) + 1,
                    war_points: Math.floor(Math.random() * 10000)
                });
            }
            return bases;
        }

        // ──── UI UPDATES ────
        function updateConnectionStatus(status, msg) {
            const el = document.getElementById('connection-status');
            el.textContent = msg;
            el.className = status;
        }

        function updatePlayerInfo() {
            if (!gameState.playerData) return;
            
            const p = gameState.playerData;
            const resources = p.base_resources?.resources || {};
            
            document.getElementById('player-name').textContent = `👤 ${p.username} (Lv${p.level})`;
            document.getElementById('player-sector').textContent = `📍 Sector: ${p.sector} | 🎖️ ${p.war_points} pts`;
            document.getElementById('player-base').textContent = `🏰 ${p.base_name || 'Base Not Setup'}`;
            document.getElementById('player-resources').textContent = 
                `🪵${resources.wood} 🧱${resources.bronze} ⛓️${resources.iron}`;
        }

        function updateSectorInfo(sectorNum) {
            const bases = Object.values(gameState.baseLocations)
                .filter(b => b.sector === sectorNum);
            
            let info = `📍 *SECTOR ${sectorNum}*\n\n`;
            
            // Highlight player's base if in this sector
            if (gameState.playerData && gameState.playerData.sector === sectorNum) {
                info += `👤 *YOUR BASE HERE*\n`;
                info += `   Base: ${gameState.playerData.base_name}\n`;
                info += `   Level: ${gameState.playerData.level}\n\n`;
            }
            
            if (bases.length > 0) {
                info += `🏰 **OTHER BASES (${bases.length}):**\n`;
                bases.slice(0, 5).forEach(b => {
                    if (gameState.playerData && b.user_id === gameState.playerData.user_id) {
                        return;  // Skip player's own base
                    }
                    info += `├─ ${b.name} (Lv${b.level})\n`;
                });
                if (bases.length > 5) info += `└─ +${bases.length - 5} more\n\n`;
            } else {
                info += `🏜️ Sector is empty\n\n`;
            }
            
            info += `💡 Tap to view more details`;
            document.getElementById('sector-details').textContent = info;
        }

        function preload() {}

        // ──── CREATE SCENE ────
        async function create() {
            // Initialize user
            if (!initializeUser()) {
                console.error('Failed to initialize user');
                return;
            }
            
            // Fetch initial data
            await fetchPlayerData();
            const bases = await fetchAllBases();
            
            // Process bases into location map
            bases.forEach(base => {
                gameState.baseLocations[base.user_id] = {
                    user_id: base.user_id,
                    username: base.username,
                    sector: base.sector,
                    name: base.base_name,
                    level: base.level,
                    war_points: base.war_points
                };
            });
            
            updatePlayerInfo();
            
            const sectorSize = 2000;
            const worldSize = sectorSize * 8;

            this.cameras.main.setBounds(0, 0, worldSize, worldSize);
            this.cameras.main.setZoom(0.05);
            this.cameras.main.centerOn(worldSize/2, worldSize/2);

            // ──── BUILD WORLD ────
            for (let x = 0; x < 8; x++) {
                for (let y = 0; y < 8; y++) {
                    let posX = x * sectorSize;
                    let posY = y * sectorSize;
                    let sectorNum = x * 8 + y + 1;  // Sectors 1-64
                    
                    gameState.allSectors[sectorNum] = {
                        x: posX + 1000,
                        y: posY + 1000,
                        gridX: x,
                        gridY: y
                    };

                    let container = this.add.container(posX, posY);
                    
                    // Sector background
                    let rect = this.add.rectangle(1000, 1000, 1980, 1980, 0x0a141d)
                        .setStrokeStyle(4, 0x1a2b3c);
                    container.add(rect);

                    // Sector label
                    let label = this.add.text(1000, 1000, sectorNum.toString(), { 
                        font: 'bold 400px Arial', 
                        fill: '#ffffff' 
                    }).setOrigin(0.5).setAlpha(0.1);
                    container.add(label);

                    // Check if this is player's sector
                    const isPlayerSector = gameState.currentSector === sectorNum;
                    
                    // HQ
                    if ((x + y) !== 9) {
                        let color = isPlayerSector ? 0xff00ff : 0x00ff00;
                        let hq = this.add.rectangle(1000, 1000, 200, 200, color, 0.3)
                            .setStrokeStyle(4, color);
                        let hqText = this.add.text(1000, 1000, isPlayerSector ? "YOU" : "HQ", { 
                            font: '40px Courier', 
                            fill: color 
                        }).setOrigin(0.5);
                        
                        container.add([hq, hqText]);
                    }

                    // Player current location indicator
                    if (isPlayerSector && gameState.playerData) {
                        // Add pulsing indicator
                        let pulseCircle = this.add.circle(1000, 1000, 250, 0xff00ff, 0.1)
                            .setStrokeStyle(3, 0xff00ff);
                        let pulseText = this.add.text(1000, 1200, `${gameState.playerData.username}`, {
                            font: 'bold 20px Arial',
                            fill: '#ff00ff'
                        }).setOrigin(0.5);
                        
                        container.add([pulseCircle, pulseText]);
                    }

                    // Spawn resources
                    spawnResources(this, container, x, y);
                    
                    // Spawn bases in this sector
                    spawnBasesInSector(this, container, sectorNum);
                    
                    // Make sector interactive
                    let hitArea = this.add.rectangle(1000, 1000, 1980, 1980)
                        .setFillStyle(0, 0)
                        .setInteractive();
                    hitArea.sectorNum = sectorNum;
                    hitArea.on('pointerdown', () => {
                        updateSectorInfo(sectorNum);
                        console.log(`Clicked sector ${sectorNum}`);
                    });
                    container.add(hitArea);
                    
                    this.add.container(posX, posY, container);
                }
            }

            // ──── START SYNC LOOP ────
            setInterval(() => syncGameState(this), UPDATE_INTERVAL);
        }

        function spawnResources(scene, container, sX, sY) {
            const isIronWaste = (sX === 0 && sY > 0);
            const count = isIronWaste ? 25 : 10;
            
            for (let i = 0; i < count; i++) {
                const color = isIronWaste ? 0x888888 : 0xffaa00;
                const size = isIronWaste ? 15 : 20;
                const circle = scene.add.circle(
                    Math.random() * 1800 + 100,
                    Math.random() * 1800 + 100,
                    size,
                    color
                ).setAlpha(0.6);
                container.add(circle);
            }
        }

        function spawnBasesInSector(scene, container, sectorNum) {
            const basesInSector = Object.values(gameState.baseLocations)
                .filter(b => b.sector === sectorNum);
            
            basesInSector.slice(0, 4).forEach((base, idx) => {
                const angle = (idx * Math.PI * 2) / Math.min(4, basesInSector.length);
                const x = 1000 + Math.cos(angle) * 600;
                const y = 1000 + Math.sin(angle) * 600;
                
                // Base fortress
                const fortress = scene.add.rectangle(x, y, 120, 120, 0xaa6600, 0.7)
                    .setStrokeStyle(3, 0xffdd00);
                
                // Base label
                const label = scene.add.text(x, y, `Lv${base.level}`, {
                    font: 'bold 14px Arial',
                    fill: '#ffdd00'
                }).setOrigin(0.5);
                
                container.add([fortress, label]);
            });
        }

        async function syncGameState(scene) {
            const now = Date.now();
            if (now - lastUpdate < UPDATE_INTERVAL) return;
            
            lastUpdate = now;
            
            try {
                const newData = await fetchPlayerData();
                if (newData) {
                    gameState.playerData = newData;
                    updatePlayerInfo();
                    updateConnectionStatus('success', '✅ Synced');
                }
            } catch (e) {
                updateConnectionStatus('error', '❌ Sync failed');
            }
        }

        function update() {
            let zoom = this.cameras.main.zoom;
            let p1 = this.input.pointer1;
            let p2 = this.input.pointer2;

            // Perspective shift
            Object.values(gameState.allSectors).forEach(s => {
                if (zoom > 0.8) {
                    // Apply tilt effect when zoomed in
                } else {
                    // Reset when zoomed out
                }
            });

            // Pinch to zoom
            if (p1.isDown && p2.isDown) {
                let dist = Phaser.Math.Distance.Between(p1.x, p1.y, p2.x, p2.y);
                if (this.lastPinchDist > 0) {
                    let zoomChange = (dist - this.lastPinchDist) * 0.0005;
                    this.cameras.main.zoom = Phaser.Math.Clamp(zoom + zoomChange, 0.04, 1.8);
                }
                this.lastPinchDist = dist;
            } else {
                this.lastPinchDist = 0;
            }

            // Pan (drag)
            if (p1.isDown && !p2.isDown) {
                if (p1.prevPosition) {
                    this.cameras.main.scrollX -= (p1.x - p1.prevPosition.x) / zoom;
                    this.cameras.main.scrollY -= (p1.y - p1.prevPosition.y) / zoom;
                }
            }

            // Update UI with current position
            document.getElementById('zoom-level').textContent = `Zoom: ${(zoom * 100).toFixed(0)}%`;
            document.getElementById('coordinates').textContent = 
                `Pos: (${Math.round(this.cameras.main.scrollX)}, ${Math.round(this.cameras.main.scrollY)})`;
        }
    </script>
</body>
</html>
