<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Sixty4 | World Map</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            overflow: hidden; 
            background-color: #050a0f;
            font-family: 'Courier New', monospace;
            color: #00ff00;
        }

        /* ═══ MAIN UI PANELS ═══ */
        #ui-overlay {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.9);
            color: #00ff00;
            padding: 15px;
            border: 3px solid #00ff00;
            font-size: 12px;
            z-index: 1000;
            max-width: 320px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,255,0,0.3);
        }

        #player-info {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.9);
            color: #00ff00;
            padding: 15px;
            border: 3px solid #00ff00;
            font-size: 12px;
            z-index: 1000;
            border-radius: 8px;
            max-width: 300px;
            box-shadow: 0 0 15px rgba(0,255,0,0.3);
        }

        #alerts-panel {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,0,0,0.95);
            border: 2px solid #ff4444;
            padding: 10px 15px;
            border-radius: 8px;
            max-width: 500px;
            z-index: 2000;
            max-height: 150px;
            overflow-y: auto;
            box-shadow: 0 0 20px rgba(255,68,68,0.4);
            display: none;
        }

        .alert-item {
            padding: 8px;
            margin: 5px 0;
            background: rgba(255,68,68,0.2);
            border-left: 3px solid #ff4444;
            animation: slideIn 0.3s ease-out;
        }

        #sector-info {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.9);
            color: #00ff00;
            padding: 15px;
            border: 3px solid #00ff00;
            font-size: 11px;
            z-index: 1000;
            max-width: 400px;
            border-radius: 8px;
            max-height: 350px;
            overflow-y: auto;
            box-shadow: 0 0 15px rgba(0,255,0,0.3);
        }

        #action-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            border: 2px solid #ffaa00;
            padding: 15px;
            border-radius: 8px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 0 15px rgba(255,170,0,0.3);
        }

        .action-btn {
            background: rgba(255,170,0,0.2);
            border: 1px solid #ffaa00;
            color: #ffaa00;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .action-btn:hover {
            background: rgba(255,170,0,0.5);
            box-shadow: 0 0 10px rgba(255,170,0,0.6);
            transform: scale(1.05);
        }

        /* ═══ ANIMATIONS ═══ */
        @keyframes pulse {
            0% { box-shadow: 0 0 10px currentColor; }
            50% { box-shadow: 0 0 20px currentColor, 0 0 40px currentColor; }
            100% { box-shadow: 0 0 10px currentColor; }
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes glow {
            0% { text-shadow: 0 0 5px; }
            50% { text-shadow: 0 0 20px; }
            100% { text-shadow: 0 0 5px; }
        }

        .pulse-animation {
            animation: pulse 2s infinite;
        }

        .danger { color: #ff4444; animation: glow 1s infinite; }
        .warning { color: #ffaa00; }
        .success { color: #00ff00; }

        .text-small { font-size: 10px; }
        .text-bold { font-weight: bold; }

        /* ═══ LOADING SPINNER ═══ */
        .spinner {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ff00;
            border-radius: 50%;
            animation: bounce 1s infinite;
        }

        /* ═══ SCROLLBAR ═══ */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,255,0,0.1); }
        ::-webkit-scrollbar-thumb { background: #00ff00; border-radius: 3px; }
    </style>
</head>
<body>
    <!-- Main Game Canvas -->
    <div id="game-container"></div>

    <!-- HUD Panels -->
    <div id="ui-overlay">
        <div><strong>🗺️ SECTOR MAP - THE SIXTY4</strong></div>
        <div id="zoom-level" class="text-small">Zoom: 5%</div>
        <div id="coordinates" class="text-small">Pos: (4000, 4000)</div>
        <div id="connection-status" class="warning"><span class="spinner"></span> Connecting...</div>
        <div id="game-stats" style="margin-top: 10px; font-size: 11px; border-top: 1px solid #00ff00; padding-top: 8px;">
            <div>⚔️ Threats: <span id="threat-count">0</span></div>
            <div>🚀 Raids Possible: <span id="raid-count">0</span></div>
            <div>💎 Resources: <span id="nearby-resources">0</span></div>
        </div>
    </div>
    
    <div id="player-info">
        <div id="player-name" class="text-bold">Loading...</div>
        <div id="player-sector">Sector: --</div>
        <div id="player-base">Base: --</div>
        <div id="player-resources">Resources: --</div>
        <div id="player-defense" style="margin-top: 8px; color: #ffaa00;">Defense: --</div>
        <hr style="border: 1px solid #00ff00; margin: 8px 0;">
        <div id="player-location-btn" style="cursor: pointer; padding: 8px; background: #1a3a2a; border: 1px solid #00ff00; border-radius: 3px; text-align: center; margin: 8px 0; transition: all 0.2s; user-select: none;">
            📍 YOUR LOCATION
        </div>
        <div id="player-location-btn:hover" style="background: #2a5a4a;"></div>
        <div id="location-details" style="font-size: 10px; margin-top: 8px; display: none; color: #ffaa00; border-top: 1px solid #00ff00; padding-top: 8px;">
            <!-- Location info -->
        </div>
    </div>

    <div id="alerts-panel">
        <strong style="color: #ff6666;">⚠️ ALERTS</strong>
        <div id="alerts-list"></div>
    </div>

    <div id="sector-info">
        <div><strong>📍 SECTOR INFO</strong></div>
        <div id="sector-details" style="margin-top: 8px;">Click on a sector to view details</div>
    </div>

    <div id="action-panel">
        <button class="action-btn" id="btn-use-weapon">🔫 Use Weapon</button>
        <button class="action-btn" id="btn-raid-sector">💥 Raid Sector</button>
        <button class="action-btn" id="btn-scout">🔍 Scout</button>
        <button class="action-btn" id="btn-teleport">⚡ Teleport</button>
        <button class="action-btn" id="btn-help">❓ Help</button>
    </div>

    <script>
        // ════════════════════════════════════════════════════════════════════
        // THE SIXTY4 - WORLD MAP SYSTEM - EXTREMELY ADDICTIVE EDITION
        // ════════════════════════════════════════════════════════════════════
        
        const config = {
            type: Phaser.AUTO,
            scale: { mode: Phaser.Scale.RESIZE, width: '100%', height: '100%' },
            backgroundColor: '#050a0f',
            input: { activePointers: 3 },
            scene: { preload, create, update, render }
        };

        const game = new Phaser.Game(config);
        
        // ──── GLOBAL STATE ────
        let gameState = {
            userId: null,
            currentSector: null,
            playerData: null,
            allSectors: {},
            baseLocations: {},
            selectedSector: null,
            threats: [],
            alerts: [],
            selectedTarget: null
        };
        
        let lastUpdate = 0;
        const UPDATE_INTERVAL = 3000;  // Sync every 3 seconds (faster!)

        // ──── UTILITY FUNCTIONS ────
        function addAlert(msg, type = 'warning') {
            gameState.alerts.unshift({ msg, type, time: Date.now() });
            if (gameState.alerts.length > 10) gameState.alerts.pop();
            updateAlertsDisplay();
        }

        function updateAlertsDisplay() {
            const panel = document.getElementById('alerts-panel');
            const list = document.getElementById('alerts-list');
            
            if (gameState.alerts.length === 0) {
                panel.style.display = 'none';
                return;
            }
            
            panel.style.display = 'block';
            list.innerHTML = '';
            
            gameState.alerts.slice(0, 5).forEach(alert => {
                const div = document.createElement('div');
                div.className = 'alert-item';
                div.textContent = alert.msg;
                list.appendChild(div);
            });
        }

        // ──── INITIALIZE USER ────
        function initializeUser() {
            const params = new URLSearchParams(window.location.search);
            gameState.userId = params.get('user_id') || localStorage.getItem('user_id');
            
            if (gameState.userId) {
                console.log('✅ User initialized:', gameState.userId);
                localStorage.setItem('user_id', gameState.userId);
                updateConnectionStatus('success', '✅ Connected');
                setupActionButtons();
                return true;
            } else {
                console.warn('⚠️ No user_id provided');
                updateConnectionStatus('error', '❌ No User ID');
                return false;
            }
        }

        // ──── ACTION BUTTONS ────
        function setupActionButtons() {
            document.getElementById('btn-use-weapon').onclick = () => {
                addAlert('🔫 Open Telegram to use weapon: /use_weapon');
                alert('Open your Telegram Bot and use /use_weapon command to select target');
            };

            document.getElementById('btn-raid-sector').onclick = () => {
                if (gameState.selectedSector) {
                    addAlert(`💥 Raiding Sector ${gameState.selectedSector}...`);
                    alert(`Initiate raid on Sector ${gameState.selectedSector} in Telegram: /raid ${gameState.selectedSector}`);
                } else {
                    addAlert('⚠️ Select a sector first!');
                }
            };

            document.getElementById('btn-scout').onclick = () => {
                if (gameState.selectedSector) {
                    addAlert(`🔍 Scanning Sector ${gameState.selectedSector}...`);
                    alert(`Scout Sector ${gameState.selectedSector} from Telegram: /scout ${gameState.selectedSector}`);
                } else {
                    addAlert('⚠️ Select a sector first!');
                }
            };

            document.getElementById('btn-teleport').onclick = () => {
                if (gameState.selectedSector) {
                    addAlert(`⚡ Teleporting to Sector ${gameState.selectedSector}...`);
                    alert(`Teleport to Sector ${gameState.selectedSector} from Telegram: /teleport ${gameState.selectedSector}`);
                } else {
                    addAlert('⚠️ Select a sector first!');
                }
            };

            document.getElementById('btn-help').onclick = () => {
                alert('🎮 THE SIXTY4 WORLD MAP\n\n' +
                      '💡 Click sectors to view details\n' +
                      '🔫 Use weapons from the action panel\n' +
                      '💥 Raid enemy bases for resources\n' +
                      '🔍 Scout before attacking\n' +
                      '⚡ Teleport to new sectors\n'\n' +
                      '🎯 Strategy: Scout → Plan → Attack → Raid!\n' +
                      '📊 Higher level = stronger weapons');
            };
        }

        // ──── API CALLS ────
        async function fetchPlayerData() {
            if (!gameState.userId) return null;
            
            try {
                const response = await fetch(`/api/player/${gameState.userId}`);
                if (response.ok) {
                    const data = await response.json();
                    gameState.playerData = data;
                    gameState.currentSector = data.sector;
                    return data;
                }
            } catch (e) {
                return getMockPlayerData();
            }
        }

        async function fetchAllBases() {
            try {
                const response = await fetch('/api/all_bases');
                if (response.ok) {
                    const data = await response.json();
                    return data.bases || [];
                }
            } catch (e) {
                return getMockBases();
            }
        }

        // ──── MOCK DATA ────
        function getMockPlayerData() {
            return {
                user_id: gameState.userId,
                username: `Player_${gameState.userId.slice(-4)}`,
                sector: Math.floor(Math.random() * 9) + 1,
                level: Math.floor(Math.random() * 25) + 1,
                base_name: 'Fortress Alpha',
                base_resources: {
                    resources: {
                        wood: Math.floor(Math.random() * 500),
                        bronze: Math.floor(Math.random() * 300),
                        iron: Math.floor(Math.random() * 100)
                    },
                    food: Math.floor(Math.random() * 200)
                },
                wins: Math.floor(Math.random() * 50),
                war_points: Math.floor(Math.random() * 5000),
                defense: Math.floor(Math.random() * 200) + 50
            };
        }

        function getMockBases() {
            const bases = [];
            const baseNames = ['Obsidian Keep', 'Crystal Spire', 'Iron Fortress', 'Shadow Hold', 'Golden Peak'];
            
            for (let i = 0; i < 20; i++) {
                bases.push({
                    user_id: `player_${i}`,
                    username: `Player${i}`,
                    sector: Math.floor(Math.random() * 64) + 1,
                    base_name: baseNames[i % baseNames.length],
                    level: Math.floor(Math.random() * 30) + 1,
                    war_points: Math.floor(Math.random() * 10000),
                    defense: Math.floor(Math.random() * 300)
                });
            }
            return bases;
        }

        // ──── UI UPDATES ────
        function updateConnectionStatus(status, msg) {
            const el = document.getElementById('connection-status');
            el.textContent = msg;
            el.className = status;
        }

        function updatePlayerInfo() {
            if (!gameState.playerData) return;
            
            const p = gameState.playerData;
            const resources = p.base_resources?.resources || {};
            const totalResources = Object.values(resources).reduce((a, b) => a + b, 0);
            
            document.getElementById('player-name').textContent = `👤 ${p.username} (LV${p.level})`;
            document.getElementById('player-sector').textContent = `📍 Sector: ${p.sector}⚔️ War Points: ${p.war_points}`;
            document.getElementById('player-base').textContent = `🏰 ${p.base_name || 'Base Not Setup'}`;
            document.getElementById('player-resources').textContent = 
                `🪵${resources.wood} 🧱${resources.bronze} ⛓️${resources.iron}`;
            document.getElementById('player-defense').textContent = `🛡️ Defense: ${p.defense || 100}`;
            document.getElementById('threat-count').textContent = gameState.threats.length;
            document.getElementById('nearby-resources').textContent = totalResources;
        }

        function updateSectorInfo(sectorNum) {
            const bases = Object.values(gameState.baseLocations).filter(b => b.sector === sectorNum);
            
            let info = `📍 **SECTOR ${sectorNum}**\n\n`;
            
            if (gameState.playerData && gameState.playerData.sector === sectorNum) {
                info += `👤 *YOUR BASE IS HERE*\n`;
                info += `   Base: ${gameState.playerData.base_name}\n`;
                info += `   Level: ${gameState.playerData.level}\n`;
                info += `   Defense: ${gameState.playerData.defense || 100}\n\n`;
            }
            
            if (bases.length > 0) {
                info += `🏰 **ENEMY BASES (${bases.length}):**\n`;
                bases.slice(0, 8).forEach(b => {
                    if (gameState.playerData && b.user_id !== gameState.playerData.user_id) {
                        const threat = b.level > (gameState.playerData?.level || 1) ? '🔴' : '🟢';
                        info += `${threat} ${b.name} (Lv${b.level}) - ${b.war_points}pts\n`;
                    }
                });
            } else {
                info += `🏜️ Sector appears empty\n\n`;
            }
            
            info += `\n💡 Click buttons above to interact`;
            document.getElementById('sector-details').textContent = info;
        }

        function preload() {}

        // ──── CREATE SCENE ────
        async function create() {
            if (!initializeUser()) return;
            
            await fetchPlayerData();
            const bases = await fetchAllBases();
            
            // Process bases
            bases.forEach(base => {
                gameState.baseLocations[base.user_id] = {
                    user_id: base.user_id,
                    username: base.username,
                    sector: base.sector,
                    name: base.base_name,
                    level: base.level,
                    war_points: base.war_points,
                    defense: base.defense || 100
                };
                
                // Detect threats
                if (gameState.playerData && base.sector === gameState.playerData.sector && 
                    base.user_id !== gameState.playerData.user_id) {
                    gameState.threats.push(base);
                }
            });
            
            updatePlayerInfo();
            
            const sectorSize = 2000;
            const worldSize = sectorSize * 8;

            this.cameras.main.setBounds(0, 0, worldSize, worldSize);
            this.cameras.main.setZoom(0.05);
            this.cameras.main.centerOn(worldSize/2, worldSize/2);

            // ──── BUILD WORLD ────
            for (let x = 0; x < 8; x++) {
                for (let y = 0; y < 8; y++) {
                    let posX = x * sectorSize;
                    let posY = y * sectorSize;
                    let sectorNum = x * 8 + y + 1;
                    
                    gameState.allSectors[sectorNum] = {
                        x: posX + 1000,
                        y: posY + 1000,
                        gridX: x,
                        gridY: y
                    };

                    let container = this.add.container(posX, posY);
                    
                    // Sector background
                    let rect = this.add.rectangle(1000, 1000, 1980, 1980, 0x0a141d)
                        .setStrokeStyle(4, 0x1a2b3c);
                    container.add(rect);

                    // Sector number (background)
                    let label = this.add.text(1000, 1000, sectorNum.toString(), { 
                        font: 'bold 400px Arial', 
                        fill: '#ffffff' 
                    }).setOrigin(0.5).setAlpha(0.08);
                    container.add(label);

                    // Check if player's sector
                    const isPlayerSector = gameState.currentSector === sectorNum;
                    
                    // Player location indicator
                    if (isPlayerSector && gameState.playerData) {
                        let outerPulse = this.add.circle(1000, 1000, 300, 0xff00ff, 0.05)
                            .setStrokeStyle(4, 0xff00ff);
                        
                        let midPulse = this.add.circle(1000, 1000, 250, 0xff00ff, 0.08)
                            .setStrokeStyle(3, 0xff00ff);
                        
                        let playerMarker = this.add.circle(1000, 1000, 100, 0xff00ff, 0.3)
                            .setStrokeStyle(3, 0xff00ff);
                        
                        let playerText = this.add.text(1000, 1200, `👤 ${gameState.playerData.username}`, {
                            font: 'bold 24px Arial',
                            fill: '#ff00ff'
                        }).setOrigin(0.5);
                        
                        container.add([outerPulse, midPulse, playerMarker, playerText]);
                        
                        // Animate pulse
                        this.tweens.add({
                            targets: [outerPulse, midPulse],
                            alpha: [0.1, 0.3],
                            duration: 1500,
                            repeat: -1,
                            yoyo: true
                        });
                    }
                    
                    // HQ/Base indicator
                    if ((x + y) !== 9) {
                        let color = isPlayerSector ? 0xff00ff : 0x00ff00;
                        let hq = this.add.rectangle(1000, 1000, 180, 180, color, 0.2)
                            .setStrokeStyle(4, color);
                        let hqText = this.add.text(1000, 1000, isPlayerSector ? "HOME" : "HQ", { 
                            font: 'bold 36px Courier', 
                            fill: color 
                        }).setOrigin(0.5);
                        
                        container.add([hq, hqText]);
                    }

                    // Spawn resources
                    spawnResources(this, container, x, y);
                    
                    // Spawn bases and threats in sector
                    spawnBasesInSector(this, container, sectorNum);
                    
                    // Interactive hit area
                    let hitArea = this.add.rectangle(1000, 1000, 1980, 1980)
                        .setFillStyle(0, 0)
                        .setInteractive();
                    hitArea.sectorNum = sectorNum;
                    hitArea.on('pointerdown', () => {
                        gameState.selectedSector = sectorNum;
                        updateSectorInfo(sectorNum);
                        addAlert(`Selected Sector ${sectorNum}`);
                        console.log(`Clicked sector ${sectorNum}`);
                    });
                    container.add(hitArea);
                    
                    this.add.container(posX, posY, container);
                }
            }

            // ──── START SYNC LOOP ────
            setInterval(() => syncGameState(this), UPDATE_INTERVAL);
        }

        function spawnResources(scene, container, sX, sY) {
            const isIronWaste = (sX === 0 && sY > 0);
            const resourceCount = isIronWaste ? 30 : 15;
            
            for (let i = 0; i < resourceCount; i++) {
                const color = isIronWaste ? 0x888888 : (sX % 2 === 0 ? 0xffaa00 : 0x88aa00);
                const size = isIronWaste ? 12 : 16;
                const x = Math.random() * 1800 + 100;
                const y = Math.random() * 1800 + 100;
                
                const circle = scene.add.circle(x, y, size, color, 0.7);
                container.add(circle);
                
                // Gentle pulse animation
                scene.tweens.add({
                    targets: circle,
                    alpha: [0.5, 0.8],
                    scale: [0.9, 1.1],
                    duration: 2000 + Math.random() * 1000,
                    repeat: -1,
                    yoyo: true
                });
            }
        }

        function spawnBasesInSector(scene, container, sectorNum) {
            const basesInSector = Object.values(gameState.baseLocations)
                .filter(b => b.sector === sectorNum);
            
            basesInSector.slice(0, 5).forEach((base, idx) => {
                const angle = (idx * Math.PI * 2) / Math.min(5, basesInSector.length);
                const x = 1000 + Math.cos(angle) * 650;
                const y = 1000 + Math.sin(angle) * 650;
                
                // Threat level color
                const isThreat = base.level > (gameState.playerData?.level || 1);
                const color = isThreat ? 0xff4444 : 0xffdd00;
                
                const fortress = scene.add.rectangle(x, y, 120, 120, color, 0.6)
                    .setStrokeStyle(3, color);
                
                const label = scene.add.text(x, y, `L${base.level}`, {
                    font: 'bold 14px Arial',
                    fill: color
                }).setOrigin(0.5);
                
                // Threat indicator
                if (isThreat) {
                    const danger = scene.add.text(x, y - 80, '⚠️ THREAT', {
                        font: 'bold 12px Arial',
                        fill: '#ff4444'
                    }).setOrigin(0.5);
                    container.add(danger);
                }
                
                container.add([fortress, label]);
                
                // Animate if threat
                if (isThreat) {
                    scene.tweens.add({
                        targets: fortress,
                        alpha: [0.5, 0.8],
                        duration: 1000,
                        repeat: -1,
                        yoyo: true
                    });
                }
            });
        }

        async function syncGameState(scene) {
            const now = Date.now();
            if (now - lastUpdate < UPDATE_INTERVAL) return;
            
            lastUpdate = now;
            
            try {
                const newData = await fetchPlayerData();
                if (newData) {
                    gameState.playerData = newData;
                    updatePlayerInfo();
                    updateConnectionStatus('success', '✅ Synced');
                    
                    // Check for new threats
                    const newThreats = Object.values(gameState.baseLocations)
                        .filter(b => b.sector === newData.sector && 
                                    b.user_id !== newData.user_id &&
                                    b.level > newData.level);
                    
                    if (newThreats.length > gameState.threats.length) {
                        addAlert(`🔴 ${newThreats.length} THREATS DETECTED IN SECTOR!`);
                    }
                    
                    gameState.threats = newThreats;
                }
            } catch (e) {
                updateConnectionStatus('error', '❌ Sync failed');
            }
        }

        function update() {
            let zoom = this.cameras.main.zoom;
            let p1 = this.input.pointer1;
            let p2 = this.input.pointer2;

            // Pinch to zoom
            if (p1.isDown && p2.isDown) {
                let dist = Phaser.Math.Distance.Between(p1.x, p1.y, p2.x, p2.y);
                if (this.lastPinchDist > 0) {
                    let zoomChange = (dist - this.lastPinchDist) * 0.0005;
                    this.cameras.main.zoom = Phaser.Math.Clamp(zoom + zoomChange, 0.04, 1.8);
                }
                this.lastPinchDist = dist;
            } else {
                this.lastPinchDist = 0;
            }

            // Pan (drag)
            if (p1.isDown && !p2.isDown) {
                if (p1.prevPosition) {
                    this.cameras.main.scrollX -= (p1.x - p1.prevPosition.x) / zoom;
                    this.cameras.main.scrollY -= (p1.y - p1.prevPosition.y) / zoom;
                }
            }

            // Update UI
            document.getElementById('zoom-level').textContent = `Zoom: ${(zoom * 100).toFixed(0)}%`;
            document.getElementById('coordinates').textContent = 
                `Pos: (${Math.round(this.cameras.main.scrollX)}, ${Math.round(this.cameras.main.scrollY)})`;
        }

        function render() {
            // Render loop for any additional visual updates
        }
    </script>
</body>
</html>
